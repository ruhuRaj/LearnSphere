version: '3.8'

services:
  # ── MongoDB ────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: learnsphere-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: learnsphere
    networks:
      - learnsphere-net

  # ── Node.js Backend ────────────────────────
  server:
    build: ./server
    container_name: learnsphere-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/learnsphere
      - JWT_SECRET=learnsphere_jwt_secret_change_me
      - JWT_EXPIRE=30d
      - CLIENT_URL=http://localhost:3000
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - learnsphere-net

  # ── React Frontend ─────────────────────────
  client:
    build: ./client
    container_name: learnsphere-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - learnsphere-net

  # ── Python AI Microservice ─────────────────
  ai-service:
    build: ./ai-service
    container_name: learnsphere-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    networks:
      - learnsphere-net

volumes:
  mongo-data:

networks:
  learnsphere-net:
    driver: bridge
